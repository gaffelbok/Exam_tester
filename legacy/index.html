<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Exam Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0061f2;
            --primary-hover: #004ecc;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
            --border-radius: 12px;
            --border-color: #e5e7eb;
            --danger-color: #dc2626;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        /* --- SCREENS --- */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        /* --- MENU --- */
        .menu-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        .menu-title { margin-bottom: 30px; font-size: 1.8em; color: var(--text-main); }

        .exam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .exam-btn {
            background: white;
            border: 2px solid var(--border-color);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .exam-btn:hover {
            border-color: var(--primary);
            background-color: #eff6ff;
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* --- QUIZ LAYOUT --- */
        .quiz-container {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            height: 90vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .quiz-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: white;
            z-index: 10;
        }

        .header-left { justify-self: start; }
        .header-center { justify-self: center; }
        .header-right { justify-self: end; display: flex; gap: 15px; }

        .badge {
            background-color: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
        }

        .progress-text { font-size: 0.95em; font-weight: 600; color: var(--text-muted); }

        /* HEADER BUTTONS */
        .btn-ghost {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.2s;
            color: var(--text-muted);
        }
        .btn-ghost:hover { background-color: #f3f4f6; color: var(--text-main); }
        .btn-ghost.danger { color: var(--danger-color); }
        .btn-ghost.danger:hover { background-color: var(--error-bg); }

        /* BODY */
        .quiz-body {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background-color: #fcfcfc;
        }
        .quiz-body::-webkit-scrollbar { width: 8px; }
        .quiz-body::-webkit-scrollbar-track { background: #f1f1f1; }
        .quiz-body::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }

        .question-meta {
            display: inline-block;
            background-color: #eff6ff;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.35em;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.5;
            color: #111827;
        }

        .question-image-container {
            margin-bottom: 25px;
            display: none;
            text-align: center;
        }
        
        .question-image {
            max-width: 100%;
            max-height: 400px;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .options { display: flex; flex-direction: column; gap: 12px; }

        .option-btn {
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
            font-size: 1em;
            font-family: inherit;
            color: var(--text-main);
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) { background-color: #f9fafb; border-color: #d1d5db; }
        .option-btn.selected { background-color: #eff6ff; border-color: var(--primary); color: var(--primary); font-weight: 600; }
        .option-btn.correct { background-color: var(--success-bg) !important; border-color: var(--success-text) !important; color: var(--success-text) !important; }
        .option-btn.wrong { background-color: var(--error-bg) !important; border-color: var(--error-text) !important; color: var(--error-text) !important; }

        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #fffbeb;
            border-left: 5px solid #f59e0b;
            border-radius: 6px;
            display: none;
            animation: fadeIn 0.3s;
        }
        .explanation-text { color: #78350f; line-height: 1.6; }

        /* FOOTER */
        .quiz-footer {
            padding: 20px 30px;
            border-top: 1px solid var(--border-color);
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            z-index: 10;
        }
        .footer-left { justify-self: start; }
        .footer-center { justify-self: center; }
        .footer-right { justify-self: end; }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            justify-content: center;
        }
        .btn-primary { background-color: var(--primary); color: white; box-shadow: 0 4px 6px rgba(0, 97, 242, 0.2); }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-primary:disabled { background-color: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-secondary { background-color: white; border: 2px solid var(--border-color); color: var(--text-main); }
        .btn-secondary:hover:not(:disabled) { border-color: var(--text-main); background-color: #f9fafb; }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.3s; }

    </style>
</head>
<body>

<div id="menu-screen" class="screen active">
    <div class="menu-card">
        <h1 class="menu-title">Select Exam</h1>
        <div id="exam-list" class="exam-grid"></div>
    </div>
</div>

<div id="quiz-screen" class="screen">
    <div class="quiz-container">
        
        <div class="quiz-header">
            <div class="header-left">
                <span class="badge" id="exam-badge">Exam</span>
            </div>
            <div class="header-center">
                <div class="progress-text">
                    Question <span id="current-q">1</span> of <span id="total-q">0</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-ghost danger" onclick="resetProgress()" title="Clear all progress">Reset</button>
                <button class="btn-ghost" onclick="showMenu()" title="Exit to menu">Quit</button>
            </div>
        </div>

        <div class="quiz-body">
            <div class="question-meta" id="selection-guide">Loading...</div>
            <div class="question-text" id="question">Loading...</div>
            
            <div class="question-image-container" id="img-container">
                <img id="question-img" class="question-image" src="" alt="Question Diagram">
            </div>

            <div class="options" id="options-container"></div>
            
            <div class="explanation-box" id="explanation">
                <h4 style="margin:0 0 10px 0; color:#92400e;">Explanation</h4>
                <div class="explanation-text" id="explanation-text"></div>
            </div>
        </div>

        <div class="quiz-footer">
            <div class="footer-left">
                <button class="btn btn-secondary" id="prev-btn" onclick="navQuestion(-1)">← Previous</button>
            </div>
            
            <div class="footer-center">
                <button class="btn btn-primary" id="submit-btn" onclick="checkAnswer()">Submit</button>
            </div>

            <div class="footer-right">
                <button class="btn btn-secondary" id="next-btn" onclick="navQuestion(1)" style="visibility: hidden;">Next →</button>
            </div>
        </div>

    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const availableExams = [
        { id: 'netsecpro', name: 'NetSec Professional', file: 'netsecpro.js' },
        { id: 'f5cab2', name: 'F5 CAB2', file: 'f5cab2.js' },
        { id: 'f5cab3', name: 'F5 CAB3', file: 'f5cab3.js' },
        { id: 'f5cab4', name: 'F5 CAB4', file: 'f5cab4.js' },
        { id: 'f5cab5', name: 'F5 CAB5', file: 'f5cab5.js' } // <--- Voeg deze toe!
    ];

    // --- STATE ---
    let questions = [];
    let currentQuestionIndex = 0;
    let userState = {}; 
    let currentExamId = '';

    // --- DOM ---
    const menuScreen = document.getElementById('menu-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const examListEl = document.getElementById('exam-list');
    
    // Quiz Elements
    const questionEl = document.getElementById('question');
    const imgContainer = document.getElementById('img-container');
    const questionImg = document.getElementById('question-img');
    const optionsEl = document.getElementById('options-container');
    const guideEl = document.getElementById('selection-guide');
    const explanationBox = document.getElementById('explanation');
    const explanationText = document.getElementById('explanation-text');
    const currentQEl = document.getElementById('current-q');
    const totalQEl = document.getElementById('total-q');
    
    // Buttons
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');

    // --- INIT ---
    initMenu();

    function initMenu() {
        examListEl.innerHTML = '';
        availableExams.forEach(exam => {
            const btn = document.createElement('div');
            btn.className = 'exam-btn';
            btn.innerText = exam.name;
            btn.onclick = () => loadExamFile(exam);
            examListEl.appendChild(btn);
        });
    }

    function loadExamFile(examConfig) {
        questions = [];
        currentQuestionIndex = 0;
        userState = {};
        currentExamId = examConfig.id;
        
        window.loadExamData = function(data) {
            questions = data;
            startQuiz(examConfig.name);
        };

        const script = document.createElement('script');
        script.src = examConfig.file;
        script.onerror = () => alert(`Kon ${examConfig.file} niet laden. \n\nTIP: Zorg dat het bestand in dezelfde map staat en open de pagina via Live Server.`);
        document.body.appendChild(script);
    }

    function startQuiz(examName) {
        document.getElementById('exam-badge').innerText = examName;
        menuScreen.classList.remove('active');
        quizScreen.classList.add('active');
        totalQEl.innerText = questions.length;
        
        loadProgress();
        renderQuestion();
    }

    function showMenu() {
        quizScreen.classList.remove('active');
        menuScreen.classList.add('active');
    }

    // --- STORAGE ---
    function saveProgress() {
        const serializableState = {};
        for (const [key, value] of Object.entries(userState)) {
            serializableState[key] = {
                submitted: value.submitted,
                selected: Array.from(value.selected),
                shuffledIndices: value.shuffledIndices // SAVING SHUFFLE ORDER
            };
        }
        const progressData = {
            index: currentQuestionIndex,
            state: serializableState
        };
        localStorage.setItem(`exam_progress_${currentExamId}`, JSON.stringify(progressData));
    }

    function loadProgress() {
        const savedData = localStorage.getItem(`exam_progress_${currentExamId}`);
        if (savedData) {
            const parsed = JSON.parse(savedData);
            currentQuestionIndex = parsed.index || 0;
            userState = {};
            for (const [key, value] of Object.entries(parsed.state)) {
                userState[key] = {
                    submitted: value.submitted,
                    selected: new Set(value.selected),
                    shuffledIndices: value.shuffledIndices // LOADING SHUFFLE ORDER
                };
            }
        }
    }

    function resetProgress() {
        if(confirm("Are you sure you want to reset your progress?")) {
            localStorage.removeItem(`exam_progress_${currentExamId}`);
            userState = {};
            currentQuestionIndex = 0;
            renderQuestion();
        }
    }

    // --- SHUFFLE HELPER ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // --- RENDER ---
    function renderQuestion() {
        const qData = questions[currentQuestionIndex];
        
        // Initialize State if needed
        if (!userState[currentQuestionIndex]) {
            // Create a shuffled index array (0, 1, 2, 3...) to map options randomly
            // We store the INDICES so we can map back to the original answers
            const indices = qData.options.map((_, i) => i);
            const shuffled = shuffleArray([...indices]);
            
            userState[currentQuestionIndex] = { 
                selected: new Set(), 
                submitted: false,
                shuffledIndices: shuffled // Store the random order so it doesn't jump on submit
            };
        }
        const state = userState[currentQuestionIndex];
        
        // If for some reason old saved state doesn't have shuffledIndices, recreate them
        if (!state.shuffledIndices) {
             const indices = qData.options.map((_, i) => i);
             state.shuffledIndices = shuffleArray([...indices]);
        }

        // 1. Text & Counters
        currentQEl.innerText = currentQuestionIndex + 1;
        questionEl.innerText = qData.text;
        const maxSelections = qData.correctIndexes.length;
        guideEl.innerText = maxSelections === 1 ? "Select 1 option" : `Select ${maxSelections} options`;

        // 2. Image Logic
        if (qData.image) {
            questionImg.src = qData.image;
            imgContainer.style.display = 'block';
        } else {
            imgContainer.style.display = 'none';
            questionImg.src = '';
        }

        // 3. Options (USING SHUFFLED ORDER)
        optionsEl.innerHTML = '';
        
        // Loop through the stored SHUFFLED indices
        state.shuffledIndices.forEach(originalIndex => {
            const optText = qData.options[originalIndex]; // Get text from original list
            
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            
            // Check state using original index
            if (state.selected.has(originalIndex)) btn.classList.add('selected');

            if (state.submitted) {
                const isCorrect = qData.correctIndexes.includes(originalIndex);
                const isSelected = state.selected.has(originalIndex);

                if (isCorrect) {
                    btn.classList.add('correct');
                    btn.innerHTML = `<span>${optText}</span><span>✓</span>`;
                } else if (isSelected && !isCorrect) {
                    btn.classList.add('wrong');
                    btn.innerHTML = `<span>${optText}</span><span>✗</span>`;
                } else {
                    btn.innerHTML = `<span>${optText}</span><span></span>`;
                }
                btn.disabled = true;
                btn.style.cursor = 'default';
            } else {
                btn.innerHTML = `<span>${optText}</span><span class="status-icon"></span>`;
                // Pass originalIndex to handler
                btn.onclick = () => handleSelection(originalIndex, btn, maxSelections);
            }
            optionsEl.appendChild(btn);
        });

        // 4. Explanation
        if (state.submitted) {
            explanationText.innerHTML = qData.explanation;
            explanationBox.style.display = 'block';
        } else {
            explanationBox.style.display = 'none';
        }

        // 5. Footer Buttons
        updateFooterControls(state.submitted, state.selected.size > 0);
    }

    function updateFooterControls(isSubmitted, hasSelection) {
        prevBtn.disabled = currentQuestionIndex === 0;

        if (isSubmitted) {
            submitBtn.style.visibility = 'hidden'; 
        } else {
            submitBtn.style.visibility = 'visible';
            submitBtn.disabled = !hasSelection;
        }

        if (isSubmitted) {
            nextBtn.style.visibility = 'visible';
            
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerText = "Finish";
                nextBtn.onclick = () => showMenu(); 
            } else {
                nextBtn.innerText = "Next →";
                nextBtn.onclick = () => navQuestion(1);
            }
        } else {
            nextBtn.style.visibility = 'hidden';
        }
    }

    // --- LOGIC ---
    function handleSelection(originalIndex, btnElement, maxSelections) {
        const state = userState[currentQuestionIndex];
        if (state.submitted) return;

        if (maxSelections === 1) {
            state.selected.clear();
            state.selected.add(originalIndex);
            // Visual refresh needs to loop through children again
            // But simplified: just re-render or toggle classes. 
            // Re-render is safer with shuffle logic to ensure sync, but visual toggle is faster.
            // Let's just toggle classes on the buttons:
            Array.from(optionsEl.children).forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
        } else {
            if (state.selected.has(originalIndex)) {
                state.selected.delete(originalIndex);
                btnElement.classList.remove('selected');
            } else {
                if (state.selected.size < maxSelections) {
                    state.selected.add(originalIndex);
                    btnElement.classList.add('selected');
                } else {
                    btnElement.classList.add('shake');
                    setTimeout(() => btnElement.classList.remove('shake'), 300);
                }
            }
        }
        
        updateFooterControls(false, state.selected.size > 0);
    }

    function checkAnswer() {
        const state = userState[currentQuestionIndex];
        state.submitted = true;
        saveProgress();
        renderQuestion();
    }

    function navQuestion(direction) {
        const newIndex = currentQuestionIndex + direction;
        if (newIndex >= 0 && newIndex < questions.length) {
            currentQuestionIndex = newIndex;
            saveProgress();
            renderQuestion();
            document.querySelector('.quiz-body').scrollTop = 0;
        }
    }

</script>

</body>
</html>
